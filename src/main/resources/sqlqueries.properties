nightdriving.select  = select bigexception.exceptionid, bigexception.affiliateid, bigexception.transporterid, bigexception.vehicleid, bigexception.driverid, bigexception.startdatetime, bigexception.enddatetime, bigexception.exceptiontype, bigexception.totalduration, bigexception.totaldistance, bigexception."level", bigexception.threshold, bigexception."maxvalue", bigexception.distanceunderexception, bigexception.timeexceeded, bigexception.requiredbreak,bigexception.numberofbreak as nobreak, bigexception.maxbreak, bigexception.startgps, bigexception.endgps, bigexception.vmax, bigexception.speedid, bigexception.invaliddata, bigexception.unitid, bigexception.isrestored,bigexception.restoreduserid,bigexception.usercoments,bigexception.restauredate,bigexception.evidence,bigexception.status from "exception" bigexception where bigexception.startdatetime >= 'STARTDATSED' and bigexception.startdatetime<='ENDDATSED' and bigexception.exceptiontype = EXCEPTIONTYPE ALTIONEXCEPERT
