spring:
  application:
    name: totalapi-service
  config:
    import: "optional:configserver:http://localhost:1018/" # LInk Production "optional:configserver:http://localhost:8181/"
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 5000
        initial-interval: 1500
        multiplier: 1.5