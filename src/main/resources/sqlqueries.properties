driver.sumarytrip = select sum (validduration) as dur,sum(totaldistance) as totdist,sum(totaldripduration) as tripdur, driverid  from "driveractivitysummary" where activitydate >= 'STARTDATSED' and  activitydate<='ENDDATSED' and XXXXXXXXXXXXX group by driverid
driver.sumaryexception = select count (*) as nbrexep,exceptiontype as alertid,level,driverid  from "exception" where startdatetime >= 'STARTDATSED' and  startdatetime<='ENDDATSED' and XXXXXXXXXXXXX group by exceptiontype,level,driverid order by driverid
weeklypreventiondetails = select dr."name", dr.driverid,dr.transporterid,dr.driverkeycode as keydriver from driver dr where dr.driverkeycode != '0' and dr.driverkeycode != 'Unknow Driver' and dr.driverid in (select Z.driverid from (select count(*) as nbr,Q.driverid from (select count(*),d.activitydate,d.driverid from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr = DAYTNUMBER)
weeklypreventionsumary = select count(*),R.transporterid from (select dr."name", dr.driverid,dr.transporterid from driver dr where dr.driverkeycode != '0' and dr.driverkeycode != 'Unknow Driver' and dr.driverid in (select Z.driverid from (select count(*) as nbr,Q.driverid from (select count(*),d.activitydate,d.driverid from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr = DAYTNUMBER))R group by R.transporterid
weeklypreventionsumary5 = select count(*),R.transporterid from (select dr."name", dr.driverid,dr.transporterid from driver dr where dr.driverkeycode != '0' and dr.driverkeycode != 'Unknow Driver' and dr.driverid in (select X.driverid from (select count(*) as nbr,Q.driverid from (select count(*),d.activitydate,d.driverid from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)X where X.nbr = 5 and X.driverid not in (select Z.driverid from (select count(*) as nbr,Q.driverid from (select count(*),d.activitydate,d.driverid from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTZDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr = 6)))R group by R.transporterid
weeklysumary = select D.driverid,D.nbr from (select Z.driverid,Z.nbr from (select count(*) as nbr,Q.driverid from (select count(*),d.activitydate,d.driverid from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'INITTDATE' and d.activitydate <= 'ENDTDATE' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr <= 6 and Z.nbr >= 5)D where D.driverid in (select dp.driverid from driver dp where dp.driverkeycode != '0' and dp.driverkeycode != 'Unknow Driver')
lastdaydriving_init = select D.driverid,D.nbr,D.dist,D.lastenddatetime as dates from (select Z.driverid,Z.nbr,Z.maxs as maxdates, dist,Z.lastenddatetime from (select MAX(Q.activitydate) as maxs,sum(Q.counts) as nbr,Q.driverid,sum(Q.dist) as dist,MAX(Q.lastenddatetime) as lastenddatetime from (select count(*) as counts,d.activitydate,d.driverid,sum(d.totaldistance) as dist,Max(d.lastenddatetime) as lastenddatetime from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr = AQSWLANRGSED)D where D.driverid not in (select dp.driverid from driver dp where dp.driverkeycode != '0' and dp.driverkeycode != 'Unknow Driver')
lastdaytransporter = select DAYTNUMBER as nbrdays,O.transporterid,Max (O.maxdates) from (select dq.transporterid, T.maxdates,dq.driverid from driver dq,(select Z.driverid,Z.nbr,Z.maxs as maxdates,dist from (select MAX(Q.activitydate) as maxs,sum(Q.counts) as nbr,Q.driverid,sum(Q.dist) as dist from (select count(*) as counts,d.activitydate,d.driverid,sum(d.totaldistance) as dist from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr <= 6 and Z.nbr >= 5)T where dq.driverid = T.driverid  and dq.driverid in (select dp.driverid from driver dp where dp.driverkeycode != '0' and dp.driverkeycode != 'Unknow Driver'))O group by O.transporterid
lastdaydriving = select dr."name", dr.driverid,dr.transporterid,dr.driverkeycode as keydriver,OP.dist,OP.nbr,OP.lastenddatetime from driver dr, (select Z.driverid,Z.nbr,Z.dist,Z.lastenddatetime from (select count(*) as nbr,Q.driverid,sum(Q.dist) as dist,MAX(Q.lastenddatetime) as lastenddatetime from (select count(*),d.activitydate,d.driverid,sum(d.totaldistance) as dist,MAX(d.lastenddatetime) as lastenddatetime from driveractivitysummary d where d.totaldistance >= MINTDIST and d.activitydate >= 'STARTDATSED' and d.activitydate <= 'ENDDATSED' and XXXXXXXXXXXXX group by d.driverid ,d.activitydate)Q group by Q.driverid)Z where Z.nbr = DAYTNUMBER)OP where dr.driverid = OP.driverid and dr.driverkeycode != '0' and dr.driverkeycode != 'Unknow Driver'